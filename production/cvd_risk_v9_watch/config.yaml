architecture:
  ppg_branch: ResNet 1D-CNN (16->32->64) + BiLSTM(32)
  feature_branch: MLP (32, 32)
  shared: Dense(32)
  event_head: Dense(16) -> Dense(1, sigmoid)
  total_params: 65681
training:
  dataset: hybrid_real_synthetic_v9
  split_method: patient_level_stratified
  synthetic_augmentation:
    generator: Windkessel 3-element hemodynamic model
    motion_model: Gait-synchronized bursty artifacts (1-3 Hz)
    noise_model: 7-type (Gaussian, baseline, saturation, Poisson, salt-pepper, speckle,
      quantization)
    skin_model: MC-inspired melanin/perfusion attenuation
    n_synthetic: 480
  n_patients_total: 59
  n_patients_train: 41
  n_patients_val: 9
  n_patients_test: 9
  n_real_train_signals: 435
  n_real_val_signals: 105
  n_real_test_signals: 110
  real_sources:
  - MIMIC-IV (MI, ARREST)
  - MMASH (CONTROL)
  - SleepAccel (CONTROL)
  optimizer: AdamW
  lr: 0.0003
  batch_size: 32
  epochs_trained: 30
  class_weights:
    0: 1.076470588235294
    1: 0.9336734693877551
  data_leakage_check: "PASSED \u2014 zero patient overlap between splits"
performance_real_test:
  auroc: 0.972
  accuracy: 0.9181818181818182
  precision: 0.9180327868852459
  recall: 0.9333333333333333
  f1: 0.9256198347107438
  brier: 0.08981184661388397
  threshold: 0.05
  n_test: 110
  tn: 45
  fp: 5
  fn: 4
  tp: 56
