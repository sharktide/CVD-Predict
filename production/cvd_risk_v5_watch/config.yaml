# CVD Risk Model v5-watch
version: "v5-watch"
base_model: "cvd_risk_v4"
inversion: true
threshold: 0.55
input:
  type: "apple_watch_ppg"
  sampling_rate_hz: 25
  ppg_length: 7500
  duration_seconds: 120
performance:
  synthetic_test:
    auroc: 0.8815
    accuracy: 82.3%
    precision: 0.9831
    recall: 0.7250
    f1: 0.8345
    threshold: 0.55
  best_threshold:
    threshold: 0.35
    accuracy: 85.4%
    precision: 0.9552
    recall: 0.8000
    f1: 0.8707
notes: |
  v5-watch is a deployment wrapper around the v4 ICU model with prediction
  inversion for Apple Watch screening. The v4 model produces inverted
  predictions on wrist PPG due to population mismatch (ICU vs outpatient).
  Inverting the output recovers useful screening performance.
  
  For production use, prefer v6-watch which is trained specifically on
  wrist PPG data without needing inversion.
