version: v12
description: CVD model with wristppg synthetic data + accelerometer cross-attention
ppg_length: 7500
sampling_rate_hz: 25
feature_columns:
- HRV_CVNN
- HRV_CVSD
- HRV_IQRNN
- HRV_MCVNN
- HRV_MadNN
- HRV_MaxNN
- HRV_MeanNN
- HRV_MedianNN
- HRV_MinNN
- HRV_Prc20NN
- HRV_Prc80NN
- HRV_RMSSD
- HRV_SD1
- HRV_SD1SD2
- HRV_SD2
- HRV_SDNN
- HRV_SDRMSSD
- HRV_SDSD
- HRV_pNN20
- HRV_pNN50
- accel_dominant_freq
- accel_max_magnitude
- accel_mean_magnitude
- accel_mean_x
- accel_mean_y
- accel_mean_z
- accel_motion_energy
- accel_std_magnitude
- accel_std_x
- accel_std_y
- accel_std_z
- base_hr
- mean_amplitude
- pulse_rate
- signal_length
- sqi
- std_amplitude
- wppg_frac_afib
- wppg_frac_pvc
- wppg_frac_sinus
- wppg_latent_contractility
- wppg_latent_resistance
- wppg_latent_stiffness
- wppg_latent_vascular_tone
- wppg_mean_aix
- wppg_mean_ef
- wppg_mean_hr_beats
- wppg_mean_ptt
- wppg_mean_pwv
- wppg_mean_sv
- wppg_std_aix
- wppg_std_ef
- wppg_std_hr_beats
- wppg_std_ptt
- wppg_std_pwv
- wppg_std_sv
architecture:
  ppg_branch: ResNet 1D-CNN (16->32->64) + BiLSTM(32)
  accel_branch: ResNet 1D-CNN (16->32->64) + BiLSTM(16)
  cross_attention: PPG queries accel (32-dim)
  biodata_branch: MLP (32, 16)
  feature_branch: MLP (32, 32)
  shared: Dense(64)
  event_head: Dense(32) -> Dense(1, sigmoid)
  total_params: 123441
training:
  dataset: wristppg_synthetic + MIMIC/MMASH real
  synthetic_source: wristppg/ (physiologically-grounded simulator)
  synthetic_counts:
    healthy: 300
    at_risk: 300
    borderline: 100
  real_patients:
    train: 41
    val: 9
    test: 9
  optimizer: AdamW
  lr: 0.0003
  batch_size: 32
  epochs_trained: 26
  class_weights:
    0: 1.009090909090909
    1: 0.9910714285714286
performance_real_test:
  auroc: 0.9986666666666667
  accuracy: 0.990909090909091
  precision: 0.9836065573770492
  recall: 1.0
  f1: 0.9917355371900827
  brier: 0.027652712538838387
  threshold: 0.34499999999999986
  n_test: 110
  tn: 49
  fp: 1
  fn: 0
  tp: 60
performance_synth_test:
  auroc: 0.5322222222222222
  accuracy: 0.55
  precision: 0.5263157894736842
  recall: 1.0
  f1: 0.6896551724137931
