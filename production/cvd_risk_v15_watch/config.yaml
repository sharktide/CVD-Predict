- wppg_std_pwv
- wppg_std_sv
architecture:
  ppg_branch: ResNet 1D-CNN (16->32->64) + BiLSTM(32)
  accel_branch: ResNet 1D-CNN (16->32->64) + BiLSTM(16)
  cross_attention: PPG queries accel (32-dim)
  outputs: 3 horizon sigmoids + 3-class tier softmax
  total_params: 123622
training:
  loss: BCE(1h) + BCE(6h) + BCE(24h) + 0.3 * CCE(tier)
  epochs_trained: 23
performance_real_test:
  auroc_1h: 0.5243333333333333
  auroc_6h: 0.4686666666666667
  auroc_24h: 0.4193333333333333
  tier_accuracy: 1.0
performance_synth_test:
  auroc_1h: 0.5335515548281506
  auroc_6h: 0.6733333333333333
  auroc_24h: 0.6911111111111111
  tier_accuracy: 0.5
