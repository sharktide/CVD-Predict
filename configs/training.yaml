# Training configuration (v3 — v2 baseline + alpha2 drop + threshold tuning)
run_name: "cvd_risk_v3"

# Data
ppg_length: 7500
feature_columns: []              # populated at runtime
num_acuity_classes: 6
num_event_classes: 1

# Losses
focal_gamma: 2.0
focal_alpha: 0.25
asymmetric_loss: false            # keep v2 loss for now
fn_weight: 1.5
loss_weights:
  event_output: 1.0
  acuity_output: 0.3
  icu_domain_output: 0.2
  device_domain_output: 0.2
  sensor_quality_output: 0.1

# Optimiser
optimizer: "adamw"
lr: 3.0e-4
weight_decay: 1.0e-4

# Schedules
lr_scheduler: "cosine"
min_lr: 1.0e-6
warmup_epochs: 3

# Regularisation
dropout: 0.3
batch_norm: true

# Data augmentation — disabled to match v2
augment_ppg: false

# Training loop
epochs: 100
batch_size: 32
early_stopping_patience: 15
train_split: 0.8
val_split: 0.1
test_split: 0.1

# Class balancing
oversample_events: true
undersample_controls: true
max_control_ratio: 3.0

# Mixed precision
mixed_precision: false
